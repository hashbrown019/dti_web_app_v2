{% extends 'templates/basic.html' %}

{% block content %}
<div class="container text-center" style="margin-top: 200px; margin-bottom: 100px;">
    <h1 class="display-1 fw-bold text-wp-primary">Server Error</h1>
    <h3 class="fw-bold text-wp-secondary">{{ message }}</h3>
    <p class="text-muted">{{ error }}</p>    
</div>
{% endblock %}

{% block customScript %}
<script type="text/javascript">
    $(document).ready(function(){

        setTimeout(function(){
            $('.mis_loading').fadeOut('slow');
        }, 1500);

    });
</script>
{% endblock %}
