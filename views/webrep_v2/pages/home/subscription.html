<section class="wr_subsription">
    <div class="container">
        <div class="row">
            <div class="col-md-6 col-12 d-flex align-items-center">
                <h1 class="wp_font_librecaslon text-wp-primary">SUBSCRIBE TO OUR<br>NEWSLETTER</h1>
            </div>
            <div class="col-md-6 col-12 text-center text-wp-primary">
                <p>Be among the first to receive the latest news and updates from the RAPID Growth Project straight to your email address. Subscribe now!</p>
                <br>
                <form method="POST" id="subscribe_form" action="/webrep_v2/subscribe" class="w-75 mx-auto">
                    <div class="input-group mb-3">
                        <input type="email" class="form-control" id="subcriber_email" name="subcriber_email" placeholder="Enter your email address" aria-label="Recipient's email" aria-describedby="button-subscribe" required>
                        <!-- <button class="btn wr_secondary_btn " type="submit"  id="button-subscribe"><i class="fa fa-bell"></i> SUBSCRIBE</button> -->
                        <button class="btn wr_secondary_btn g-recaptcha" 
                            data-sitekey="{{ g_site_key }}" 
                            data-callback='onSubscribeSubmit' 
                            data-action='submit'><i class="fa fa-bell"></i> SUBSCRIBE</button>
                    </div>
                    <!-- <div class="g-recaptcha"
                        data-sitekey="6LfL2icsAAAAALUPS-KvCMKYZZ8wtaMdDoO_vyw9"
                        data-callback="onSubscribeSubmit">
                    </div> -->
                </form>
            </div>
        </div>
    </div>
</section>
