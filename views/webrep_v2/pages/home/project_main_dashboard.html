{% extends 'templates/basic.html' %}

{% block content %}
<section class="">
    <style>
    .analyticUpdateTbl th,
    .analyticUpdateTbl td {
        font-size: 10px!important;
    }
    .analyticCard {
        margin: 10px 0px;
    }
    @media screen and (max-width: 599px) {
        .analyticCard {
            margin: 10px 0px;
        }
    }
</style>
<div class="analyticUpdates_container" style="padding: 200px 0px 150px 0px; background-color: #ccc;">
    <h2 class="text-center"><i class="fa fa-bar-chart" style="color:#7B9E3E;"></i> <span style="color:#004450;">Dashboard Overview</span></h2>
    <hr style="width: 70px; background-color: #7B9E3E; height: 3px; margin: auto; margin-bottom: 50px;">
    <div class="container">
        <div class="row">
            <div class="col-12 col-md-3">
                <div class="input-group">
                    <select class="form-select applyfilter applyfilter_region rounded-pill dropdownOverride" >
                        <option value="" {% if region_selected and "all" in region_selected %}selected{% endif %}>Category</option>
                        <option value="npco" {% if region_selected and "SHF" in region_selected %}selected{% endif %}>SMALL HOLDER FARMERS</option>
                        <option value="rcu viii" {% if region_selected and "FO viii" in region_selected %}selected{% endif %}>FARMER ORGANIZATION</option>
                        <option value="rcu ix" {% if region_selected and "MSME" in region_selected %}selected{% endif %}>MICRO, SMALL, MEDIUM ENTERPRISES</option>
                    </select>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="input-group">
                    <select class="form-select applyfilter applyfilter_region rounded-pill dropdownOverride" >
                        <option value="" {% if region_selected and "all" in region_selected %}selected{% endif %}>Region</option>
                        <option value="rcu viii" {% if region_selected and "rcu viii" in region_selected %}selected{% endif %}>RCU VIII</option>
                        <option value="rcu ix" {% if region_selected and "rcu ix" in region_selected %}selected{% endif %}>RCU IX</option>
                        <option value="rcu x" {% if region_selected and "rcu x" in region_selected %}selected{% endif %}>RCU X</option>
                        <option value="rcu xi" {% if region_selected and "rcu xi" in region_selected %}selected{% endif %}>RCU XI</option>
                        <option value="rcu xii" {% if region_selected and "rcu xii" in region_selected %}selected{% endif %}>RCU XII</option>
                        <option value="rcu xiii" {% if region_selected and "rcu xiii" in region_selected %}selected{% endif %}>RCU XIII</option>
                        <option value="barmm" {% if region_selected and "barmm" in region_selected %}selected{% endif %}>BARMM</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <br>
    <br>
    <div class="container">
        <div class="row">
            <div class="col-4">
                <div class="card analyticCard">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-3">
                                <img src="/static/psalm_static/assets/img/icons/Sectors_Smallholder Farmer.png" style="width: 100%;" class="img-fluid" loading="lazy">
                            </div>
                            <div class="col-9">
                                <b class="font-28">78,000 SHFs</b><br>
                                EOP Targets
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card analyticCard">
                    <div class="card-body">
                        <div id="sample"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <br>
</div>
</section>
{% endblock %}

{% block addScriptLibrary %}
		<script type="text/javascript" src="../static/a_v2_static/vendor/chart.js/chart.umd.js"></script>
		<script type="text/javascript" src="../static/a_v2_static/vendor/echarts/echarts.min.js"></script>
        <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/5.3.5/apexcharts.min.js"></script>
{% endblock%}


{% block customScript %}
<script>
    $(document).ready(function(){

        var options = {
        series: [75],
        chart: {
            height: 350,
            type: 'radialBar',
            toolbar: {
            show: true,
            },
        },
        plotOptions: {
            radialBar: {
            startAngle: -135,
            endAngle: 225,
            hollow: {
                margin: 0,
                size: '70%',
                background: '#fff',
                image: undefined,
                imageOffsetX: 0,
                imageOffsetY: 0,
                position: 'front',
                dropShadow: {
                enabled: true,
                top: 3,
                left: 0,
                blur: 4,
                opacity: 0.5,
                },
            },
            track: {
                background: '#fff',
                strokeWidth: '67%',
                margin: 0, // margin is in pixels
                dropShadow: {
                enabled: true,
                top: -3,
                left: 0,
                blur: 4,
                opacity: 0.7,
                },
            },

            dataLabels: {
                show: true,
                name: {
                offsetY: -10,
                show: true,
                color: '#888',
                fontSize: '17px',
                },
                value: {
                formatter: function (val) {
                    return parseInt(val)
                },
                color: '#111',
                fontSize: '36px',
                show: true,
                },
            },
            },
        },
        fill: {
            type: 'gradient',
            gradient: {
            shade: 'dark',
            type: 'horizontal',
            shadeIntensity: 0.5,
            gradientToColors: ['#7CA03F'],
            inverseColors: true,
            opacityFrom: 1,
            opacityTo: 1,
            stops: [0, 100],
            },
        },
        stroke: {
            lineCap: 'round',
        },
        labels: ['Percent'],
        }

        var chart = new ApexCharts(document.querySelector('#sample'), options)
        chart.render()

        setTimeout(function(){
            $('.mis_loading').fadeOut('slow');
        }, 1500);
        

    });
</script>
{% endblock %}
