<html>
<head>
    <title>Home Page</title>
    <meta name="referrer" content="same-origin">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="../../static/webrepstatic/img/RAPID.svg">
    
    <!-- Add your Fonts here -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Caslon+Display&family=Merienda:wght@300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Add your CSS and JS links here -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ url_for('static', filename='webrepstatic_v2/css/global.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='webrepstatic_v2/css/style.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='webrepstatic_v2/css/responsive.css') }}" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vanillajs-datepicker@1.3.4/dist/css/datepicker.min.css">

    {% block customStyle %}
    {% endblock %}
</head>
<body>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            {% if session.get('show_sweetalert') %}
            const data = {{ session.pop('show_sweetalert')|tojson }}; // pop() reads and deletes in one step
            Swal.fire({
                title: data.title,
                text: data.text,
                icon: data.icon
            });
            {% endif %}
        });
    </script>

    <div class="mis_loading">
        <img src="{{ url_for('static', filename='webrepstatic_v2/img/logo-loading.gif') }}" />
    </div>
    <section class="mis_header" id="mis_header">
        {% include 'templates/layout/header.html' %}
    </section>   
    <section class="mis_content">
        {% block content %}
        {% endblock %}
    </section>
    
    <footer class="mis_footer">
        {% include 'templates/layout/footer.html' %}    
    </footer>
    <!-- Add Script Link here -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://www.google.com/recaptcha/api.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/vanillajs-datepicker@1.3.4/dist/js/datepicker-full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blowup@1.0.2/lib/blowup.min.js"></script>

    {% block customScript %}
    {% endblock %}
    <script>
        $(document).ready(function(){
            var viewportHeight = screen.height;
            const myDiv = document.getElementById('wp_navbar');
            const headerHeight = myDiv.offsetHeight;

            console.log("Viewport Height: " + viewportHeight + "px");
            console.log("header Height: " + headerHeight + "px");

            $('#wr_carousel>.carousel-inner>.carousel-item img').css('height', viewportHeight - (headerHeight+80) + 'px');

            $(window).on("scroll", function() {
                if ($(document).scrollTop() > 50) {
                    $('.navbar').addClass("shrink-navbar");
                    $('.navbar-brand>img').addClass("shrink-navbar-brand-img");
                    $('.nav-dti-logo').addClass('shrink-navbar-dti-img');
                    $('.nav-ifad-logo').addClass('shrink-navbar-ifad-img');
                    $('.navbar-toggler').addClass('shrink-menu-btn');
                } else {
                    $('.navbar').removeClass("shrink-navbar");
                    $('.navbar-brand>img').removeClass("shrink-navbar-brand-img");
                    $('.nav-dti-logo').removeClass('shrink-navbar-dti-img');
                    $('.nav-ifad-logo').removeClass('shrink-navbar-ifad-img');
                    $('.navbar-toggler').removeClass('shrink-menu-btn');
                }
            });

            $(document).on('click','.showNYAModal', function(){
                Swal.fire({
                    title: "<span style='color:#EA8624;'>NOT YET <b style='color:#D7393E;'>AVAILABLE</b></span>",
                    icon: "warning",
                    // html: `
                    //     <i class="fa fa-wrench"></i>
                    // `
                });
            });

        });
    </script>
</body>
</html>
