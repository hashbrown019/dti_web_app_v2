
<!DOCTYPE html>
<html lang="en">

<head> 
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

<title>
    FMI {% block title %}{% endblock %}
</title>

<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<link rel="icon" href="../../static/img/mis_2023_v2.svg">
<link rel="stylesheet" href="/static/fmi_static/assets/css/volt.css" type="text/css">
<link rel="stylesheet" href="/static/fmi_static/assets/css/style.css" type="text/css">
<link rel="stylesheet" href="/static/psalm_static/dcf_static/assets/vendor/@fortawesome/fontawesome-free/css/all.min.css" type="text/css">
<link rel="stylesheet" href="/static/psalm_static/dcf_static/assets/css/fontawesome/css/fontawesome.min.css" type="text/css">

<!-- Specific Page JS goes HERE  -->    
{% block stylesheets %}{% endblock stylesheets %}

</head>


    
    <main>
      {% block content %}{% endblock content %} 
    </main>

  {% include 'fmi_includes/fmi_scripts.html' %}
    
  <!-- Specific Page JS goes HERE  -->
  <script src="/static/psalm_static/dcf_static/assets/css/fontawesome/js/all.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const key = "fmi_nav_history";
      const cur = location.pathname + location.search;
      const get = () => { try { return JSON.parse(sessionStorage.getItem(key) || "[]"); } catch { return []; } };
      const set = (v) => sessionStorage.setItem(key, JSON.stringify(v));

      let visited = get();
      if (!visited.includes(cur)) { visited.push(cur); set(visited); }

      document.querySelectorAll("a[data-nav-dedupe='true']").forEach((a) => {
        a.addEventListener("click", (e) => {
          const href = a.getAttribute("href");
          if (!href || href === "#") return;
          const url = new URL(href, location.origin);
          const target = url.pathname + url.search;
          if (target === cur) return e.preventDefault();

          e.preventDefault();
          visited = get();
          if (visited.includes(target)) location.replace(a.href);
          else { visited.push(target); set(visited); location.assign(a.href); }
        });
      });
    });
  </script>
  {% block javascripts %}{% endblock javascripts %}  
      
</html>
