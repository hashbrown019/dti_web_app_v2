	function create_table (data_){
		println(" -- Creating Data Table")
		const normalizedData = data_.map(function(row){
			const normalizedRow = row.slice();
			normalizedRow[6] = formatBirthdayValue(normalizedRow[6]);
			return normalizedRow;
		});
		if (TABLE) {
			TABLE.clear();
			TABLE.rows.add(normalizedData);
			TABLE.columns.adjust().draw(false);
			return;
		}

		TABLE = new DataTable('#table_id', {
			// "scrollY":'60vh',
			"scrollX":true,
			"data" : normalizedData,
			"scrollCollapse": true,
			"autoWidth": true,
			"columnDefs": [
				{ "width": "10%", "targets": 1 },
				{
					"target": 0,
					"visible": false,
					"searchable": false,
				},
				{
					"target": 5,
					"visible": false,
					"searchable": false,
				}
			],"order": [[ 0, "desc" ]],
		});
		TABLE.columns.width = "1%"
		TABLE.columns.adjust().draw();
		// TABLE.load(data_)
		// TABLE.ajax.reload()
		set_search_field()
	}

	function remove_table_row_by_id(recordId){
		if (!TABLE) return;
		const idStr = String(recordId);
		TABLE.rows().every(function () {
			const row = this.data();
			if (String(row[0]) === idStr) {
				this.remove();
			}
		});
		TABLE.draw(false);
	}

	function upsert_table_row(rowData){
		if (!rowData || !rowData.length) return;
		const idStr = String(rowData[0]);
		if (!TABLE) {
			create_table([rowData]);
			return;
		}

		let updated = false;
		TABLE.rows().every(function () {
			const row = this.data();
			if (String(row[0]) === idStr) {
				this.data(rowData);
				updated = true;
			}
		});

		if (!updated) {
			TABLE.row.add(rowData);
		}
		TABLE.draw(false);
	}

	function sync_single_farmer_row(recordId){
		if (!recordId) return;
		$send({
			action : "/feature_0/get_farmer_data_a1_row/" + recordId,
			method : POST,
			err_dialog: true,
			func : function (rest){
				const rows = JSON.parse(rest) || [];
				if (!rows.length) {
					// Row is not available in current scope/filters; remove local copy if present.
					remove_table_row_by_id(recordId);
					return;
				}
				const normalizedRow = rows[0].slice();
				normalizedRow[6] = formatBirthdayValue(normalizedRow[6]);
				upsert_table_row(normalizedRow);
			}
		});
	}

	window.addEventListener("pfa-record-deleted", function (event) {
		const recordId = event?.detail?.id;
		if (!recordId) return;
		remove_table_row_by_id(recordId);
	});

	window.addEventListener("pfa-record-saved", function (event) {
		const recordId = event?.detail?.id;
		if (!recordId) return;
		sync_single_farmer_row(recordId);
	});

	function refresh_table_data() {
		println("Refreshing farmer list (changes only)...");
		SPINNER_LOADER.show();

		$send({
			action : "/feature_0/filter_list_farmers_delta",
			method : POST,
			data: $DATA({
				last_id: TABLE_SYNC_MAX_ID,
				last_sync: TABLE_SYNC_MAX_TS
			}),
			err_dialog:true,
			func : function (rest){
				const parsed = JSON.parse(rest);
				let res = parsed['dash1'] || [];
				println("Refreshed changed farmer rows: " + res.length);

				for (let i = 0; i < res.length; i++) {
					const normalizedRow = res[i].slice();
					normalizedRow[6] = formatBirthdayValue(normalizedRow[6]);
					upsert_table_row(normalizedRow);
				}

				if (parsed.sync) {
					TABLE_SYNC_MAX_ID = Number(parsed.sync.max_id || TABLE_SYNC_MAX_ID || 0);
					TABLE_SYNC_MAX_TS = String(parsed.sync.max_sync || TABLE_SYNC_MAX_TS || "");
				}

				SPINNER_LOADER.hide();
			},
			err : function(res){println(res)},
			progress : function(e){
				var response_length = parseFloat(e.total)
				var response_loaded = parseFloat(e.loaded)
				var percent_  = (response_loaded / response_length) * 100;
				SPINNER_LOADER.loading(Math.round(percent_));
				SPINNER_LOADER.message(`
					<span>
						Refreshing 
						<b>`+Math.round(percent_)+`%</b><br>
						<span class="x-small">
							[ `+(response_loaded/1000000).toFixed(1)+" / "+(response_length/1000000).toFixed(1)+` Mb ]
						</span>
					</span>
				`);
			}
		})
	}
