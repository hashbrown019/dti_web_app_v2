<script>


    function exportMGIData(){
        var selectedType = $('#import_type').val();
        let a= document.createElement('a');
        a.target= '_blank';
        a.href= '/export_mgimplementation?type='+selectedType;
        a.click();
    }

    function filterTable(trigger) {   
                 
        const table = document.getElementById('mgi_table');
        const rows = table.getElementsByTagName('tbody')[0].getElementsByTagName('tr');
        
        var selectedRCU = document.querySelector('#filterRCU').value; // Get the selected RCU value
        var searchDIP = document.querySelector('#filterDIPName').value.toLowerCase(); // Get the search input value and convert to lowercase
        var searchName = document.querySelector('#filterName').value.toLowerCase(); // Get the search input value and convert to lowercase

        if ( trigger === 'rcu' ) {
            if ( selectedRCU === 'All' ) {
                $('#filterPCU').children('option').show(); // Show all PCU options if 'All' is selected
            } else {
                $('#filterPCU').children('option[data-rcu="'+selectedRCU+'"]').show(); // Show PCU options for the selected RCU
                $('#filterPCU').children('option[data-rcu!="'+selectedRCU+'"]').hide(); // Hide PCU options for other RCUs
                $('#filterPCU').children('option[value="All"]').show(); // Show PCU options for the selected RCU
                $('#filterPCU').val('All'); // Reset PCU filter to 'All'
            }
        }

        var selectedPCU = document.querySelector('#filterPCU').value; // Get the selected PCU value
        var selectedCommodity = document.querySelector('#filterCommodity').value; // Get the selected Commodity value

        for (let i = 0; i < rows.length; i++) {
            const cellRCU = rows[i].getElementsByTagName('td')[1];
            const cellPCU = rows[i].getElementsByTagName('td')[2];
            const cellComm = rows[i].getElementsByTagName('td')[3];

            if (cellComm && cellRCU && cellPCU) {
                const cellTextComm = cellComm.textContent || cellComm.innerText;
                const cellTextRCU = cellRCU.textContent || cellRCU.innerText;
                const cellTextPCU = cellPCU.textContent || cellPCU.innerText;

                let showRow = true;

                // Commodity filter
                if (selectedCommodity !== 'All' &&
                    cellTextComm.trim().toLowerCase() !== selectedCommodity.toLowerCase()) {
                    showRow = false;
                }

                // RCU filter
                if (showRow && selectedRCU !== 'All' &&
                    cellTextRCU.trim().toLowerCase().indexOf(selectedRCU.toLowerCase()) === -1) {
                    showRow = false;
                }

                // PCU filter
                if (showRow && selectedPCU !== 'All' &&
                    cellTextPCU.trim().toLowerCase() !== selectedPCU.toLowerCase()) {
                    showRow = false;
                }

                // DIP filter
                if (showRow && searchDIP) {
                    const cellNameDIP = rows[i].getElementsByTagName('td')[4];
                    const cellTextNameDIP = cellNameDIP.textContent || cellNameDIP.innerText;
                    if (cellTextNameDIP.trim().toLowerCase().indexOf(searchDIP.toLowerCase()) === -1) {
                        showRow = false;
                    }
                }

                // Name filter (independent of DIP)
                if (showRow && searchName) {
                    const cellName = rows[i].getElementsByTagName('td')[5];
                    const cellTextName = cellName.textContent || cellName.innerText;
                    if (cellTextName.trim().toLowerCase().indexOf(searchName.toLowerCase()) === -1) {
                        showRow = false;
                    }
                }

                rows[i].style.display = showRow ? '' : 'none';
            }
        }


        // resetTableStripe(); // Reset the table to reapply striping and clear filters
    }

    function download_login_start(fff){
        let a= document.createElement('a');
        a.target= '_blank';
        a.href= '/login/download_file/'+fff;
        a.click();
    }

    function loadData() {
        var selectedType = $('#mgi_data_type').val();
        if ( selectedType === 'fo' ) {
            $('.mgi_table_name').html('FO Name');
        } else if ( selectedType === 'shf' ) {
            $('.mgi_table_name').html('Farmer Name');
        }
        $.ajax({
            url: '/mgimplementation_data',
            method: 'GET',
            data: { type : selectedType },
            success: function(response) {
                console.log('Data fetched successfully');
                console.log(response);
                var data = response.data;
                var userData = response.user_detail;
                var tableBody = '';
                // var counter = 1;
                data.forEach(function(item) {
                    tableBody += '<tr style="font-size:12px;">';
                    tableBody += '<td>' + item.MGI_ID + '</td>';
                    tableBody += '<td>' + item.ImpUnits_RCU + '</td>';
                    tableBody += '<td>' + item.ImpUnits_PCU + '</td>';
                    tableBody += '<td>' + item.DIP_Commodity + '</td>';
                    tableBody += '<td>' + item.DIP_Name + '</td>';
                    tableBody += '<td>' + item.Name + '</td>';
                        
                    if ( item.MGI_Type=='fo' ){
                        if ( item.UploadedBy==userData.id ){
                            tableBody += '<td class="text-end"><a href="/mis-v4/core-mg-implementation-form?form=fo&action=view&id='+item.MGI_ID+'" class="btn btn-xs btn-outline-info"><i class="fa fa-eye"></i></a> <a href="/mis-v4/core-mg-implementation-form?form=fo&action=edit&id='+item.MGI_ID+'" class="btn btn-xs btn-outline-primary"><i class="fa fa-pencil"></i></a> <button class="btn btn-xs btn-outline-danger mgi_delete_item" data-type="fo" data-id="'+item.MGI_ID+'"><i class="fa fa-trash"></i></button></td>';
                        }else {
                            tableBody += '<td class="text-end"><a href="/mis-v4/core-mg-implementation-form?form=fo&action=view&id='+item.MGI_ID+'" class="btn btn-xs btn-outline-info"><i class="fa fa-eye"></i></a></td>';
                        }
                    }else{
                        if ( item.UploadedBy==userData.id ){
                            tableBody += '<td class="text-end"><a href="/mis-v4/core-mg-implementation-form?form=shf&action=view&id='+item.MGI_ID+'" class="btn btn-xs btn-outline-info"><i class="fa fa-eye"></i></a> <a href="/mis-v4/core-mg-implementation-form?form=shf&action=edit&id='+item.MGI_ID+'" class="btn btn-xs btn-outline-primary"><i class="fa fa-pencil"></i></a> <button class="btn btn-xs btn-outline-danger mgi_delete_item" data-type="shf" data-id="'+item.MGI_ID+'"><i class="fa fa-trash"></i></button></td>';
                        }else {
                            tableBody += '<td class="text-end"><a href="/mis-v4/core-mg-implementation-form?form=shf&action=view&id='+item.MGI_ID+'" class="btn btn-xs btn-outline-info"><i class="fa fa-eye"></i></a></td>';
                        }
                    }

                    tableBody += '</tr>';
                });
                $('#mgi_table tbody').html(tableBody);
                $('#loadDataBtn').children('i').removeClass('fa-spin');
            },
            error: function(error) {
                $('#loadDataBtn').children('i').removeClass('fa-spin');
                console.error('Error fetching data:', error);
            }
        });
    }

    $(document).ready(function() {
        
        loadData();

        $('#loadDataBtn').on('click', function() {
            $(this).children('i').addClass('fa-spin');
            setTimeout(function(){
                loadData();
            }, 1000);
        });


        $(document).on('click','.mgi_delete_item',function(){
            var type = $(this).attr('data-type');
            var id = $(this).attr('data-id');
            
            if ( id==null || id.length==0 ){
                Swal.fire({
                    title: "Empty!",
                    text: "No Record Identifier Found.",
                    icon: "error"
                });
                return;
            }  
            
            $.ajax({
                url: '/mgimplementation/delete',
                method: 'POST',
                data: { type : type, id : id },
                success: function(response) {
                    // if ( response.success ){
                        Swal.fire({
                            title: "Deleted!",
                            text: response.message,
                            icon: "success"
                        });
                        $('#loadDataBtn').trigger('click');
                    // }else{
                    //     Swal.fire({
                    //         title: "Server Error!",
                    //         text: response.message,
                    //         icon: "error"
                    //     });
                    // }
                },
                error: function(error) {
                    $('#loadDataBtn').children('i').removeClass('fa-spin');
                    console.error('Error fetching data:', error);
                }
            });
        });
        
    });
</script>
